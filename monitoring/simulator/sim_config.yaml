api:
  base_url: "http://127.0.0.1:8000"
  api_port_candidates: [8000, 80]
  prometheus_url: "http://127.0.0.1:9090"

data:
  source_candidates:
    - "modelv2/raw/synthetic_credit_fraud_v2.csv"
    - "data-generation/tcb_credit_fraud_dataset.csv"
  fallback_to_synthetic: true
  seed: 42

defaults:
  requests: 300
  warmup_samples: 120
  rps: 2.0
  batch_size: 20
  mode: "batch"
  scenario: "moderate_drift"
  timeout_seconds: 20
  prometheus_wait_seconds: 20

scenarios:
  normal:
    description: "Baseline traffic to lift prediction metrics and create a warmup drift reference."
    amount_multiplier: [0.98, 1.03]
    high_risk_bias: 0.01
    merchant_country_pool: ["VN"]
    ip_country_pool: ["VN"]
    device_type_pool: ["Mobile", "Desktop"]
    os_pool: ["Android", "iOS", "Windows"]
    night_transaction_ratio: 0.05

  slight_drift:
    description: "Mild shift in amount and geography."
    amount_multiplier: [1.03, 1.20]
    high_risk_bias: 0.05
    merchant_country_pool: ["VN", "SG"]
    ip_country_pool: ["VN", "SG"]
    device_type_pool: ["Mobile", "Desktop", "POS"]
    os_pool: ["Android", "iOS", "Windows"]
    force_new_device_ratio: 0.06
    force_new_merchant_ratio: 0.04
    night_transaction_ratio: 0.15

  moderate_drift:
    description: "Recommended monitoring demo. Enough warmup plus measurable drift on key features."
    amount_multiplier: [1.15, 1.60]
    high_risk_bias: 0.12
    merchant_country_pool: ["SG", "US", "VN"]
    ip_country_pool: ["SG", "US", "VN"]
    device_type_pool: ["Mobile", "Desktop", "POS"]
    os_pool: ["Android", "iOS", "Windows"]
    force_new_device_ratio: 0.18
    force_new_merchant_ratio: 0.14
    night_transaction_ratio: 0.35

  severe_drift:
    description: "Aggressive drift and high-risk traffic to push alerts and fraud rate harder."
    amount_multiplier: [1.50, 2.40]
    high_risk_bias: 0.24
    merchant_country_pool: ["US", "SG", "JP", "VN"]
    ip_country_pool: ["US", "SG", "JP", "VN"]
    device_type_pool: ["POS", "Mobile", "Desktop"]
    os_pool: ["Android", "iOS", "Windows"]
    force_new_device_ratio: 0.28
    force_new_merchant_ratio: 0.22
    night_transaction_ratio: 0.50
