api:
  prediction_url: "http://127.0.0.1:8000/predict"
  health_url: "http://127.0.0.1:8000/health"
  drift_url: "http://127.0.0.1:8000/monitoring/drift"

data:
  source_csv: "data-generation/tcb_credit_fraud_dataset.csv"
  regenerate_before_run: false
  java_main_class: "com.SyntheticTCBFraudDataGenerator"

defaults:
  requests: 100
  rps: 2.0
  scenario: "normal"
  timeout_seconds: 15

scenarios:
  normal:
    description: "Replay data generated by data-generation without extra perturbation."
    amount_multiplier: [0.98, 1.03]
    high_risk_bias: 0.0

  slight_drift:
    description: "Mild shift in amount and geography."
    amount_multiplier: [1.02, 1.15]
    high_risk_bias: 0.04
    force_new_device_ratio: 0.05

  moderate_drift:
    description: "Moderate drift in amount, country and behavioral features."
    amount_multiplier: [1.08, 1.4]
    high_risk_bias: 0.09
    force_new_device_ratio: 0.12
    force_new_merchant_ratio: 0.10

  severe_drift:
    description: "Strong drift to stress drift monitor and alerts."
    amount_multiplier: [1.2, 2.0]
    high_risk_bias: 0.18
    force_new_device_ratio: 0.22
    force_new_merchant_ratio: 0.18
