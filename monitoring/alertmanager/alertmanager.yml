global:
  resolve_timeout: 5m

route:
  receiver: default-null
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 30m
  routes:
    - matchers:
        - auto_rollback="true"
      receiver: rollback-webhook
      continue: false

receivers:
  - name: default-null

  - name: rollback-webhook
    webhook_configs:
      - url: http://rollback-automation:8085/alertmanager
        send_resolved: false
