name: Promote MLflow Model

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: Registered model name
        required: true
        default: tcb-fraud-xgboost
      stage:
        description: Target MLflow stage
        required: true
        default: Staging
        type: choice
        options:
          - Staging
          - Production
      version:
        description: Specific model version (optional)
        required: false
        default: ""
      run_id:
        description: Training run_id (used if version is empty)
        required: false
        default: ""

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MLFLOW_S3_ENDPOINT_URL: ${{ secrets.MLFLOW_S3_ENDPOINT_URL }}
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt

      - name: Promote model version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            python -m ml_pipeline.src.promote_model \
              --model-name "${{ inputs.model_name }}" \
              --stage "${{ inputs.stage }}" \
              --version "${{ inputs.version }}"
          else
            python -m ml_pipeline.src.promote_model \
              --model-name "${{ inputs.model_name }}" \
              --stage "${{ inputs.stage }}" \
              --run-id "${{ inputs.run_id }}"
          fi
