name: Rollback Canary Traffic

on:
  workflow_dispatch:
    inputs:
      action:
        description: Rollout action
        required: true
        default: rollback
        type: choice
        options:
          - rollback
          - set-canary
          - promote
      percent:
        description: Candidate traffic percent (for set-canary)
        required: false
        default: "10"
      registry_action:
        description: Optional registry action for rollback
        required: false
        default: none
        type: choice
        options:
          - none
          - archive-current-production
          - restore-previous-production

jobs:
  rollout-control:
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER || secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY || secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH || 'tcb-fraud-detection-mlops' }}
      DEPLOY_REF: ${{ github.ref_name }}
    steps:
      - name: Validate remote rollout configuration
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing deploy host. Set GCP_DEPLOY_HOST in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing deploy user. Set GCP_DEPLOY_USER in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "Missing SSH key. Set SSH_DEPLOY_KEY in GitHub Secrets."
            exit 1
          fi

      - name: Execute rollout control remotely
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH,DEPLOY_REF
          script: |
            set -euo pipefail

            if [ "${DEPLOY_PATH#/}" = "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/$DEPLOY_PATH"
            fi

            cd "${DEPLOY_PATH}"
            git fetch --all --prune
            git checkout "${DEPLOY_REF}"
            git pull --ff-only origin "${DEPLOY_REF}"
            ROLLOUT_IMAGE="tcb-rolloutctl:$(git rev-parse --short HEAD)"

            docker build \
              --file monitoring/simulator/Dockerfile.rollout \
              --tag "${ROLLOUT_IMAGE}" \
              .

            if [ "${{ inputs.action }}" = "set-canary" ]; then
              set -- set-canary --percent "${{ inputs.percent }}"
            elif [ "${{ inputs.action }}" = "promote" ]; then
              set -- promote
            else
              set -- rollback --registry-action "${{ inputs.registry_action }}"
            fi

            docker run --rm \
              --network host \
              --user "$(id -u):$(id -g)" \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v "${DEPLOY_PATH}:/workspace" \
              -w /workspace \
              "${ROLLOUT_IMAGE}" \
              "$@"
