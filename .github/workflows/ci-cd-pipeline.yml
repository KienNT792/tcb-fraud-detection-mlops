name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# CI — Lint + Test (always runs)
# ---------------------------------------------------------------------------
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r ml_pipeline/requirements.txt -r serving_api/requirements-dev.txt

      - name: Lint
        run: flake8 ml_pipeline/src serving_api/app dags

      - name: Run all tests with coverage gate
        run: |
          pytest ml_pipeline/tests/test_preprocess.py \
                 ml_pipeline/tests/test_model.py \
                 serving_api/tests \
            --cov=ml_pipeline.src \
            --cov=serving_api.app \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ---------------------------------------------------------------------------
  # Docker Build — only when app/Dockerfile files change
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'serving_api/**'
              - 'ml_pipeline/src/**'
              - 'monitoring/evidently_ai/**'

      - name: Set up Docker Buildx
        if: steps.filter.outputs.docker == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.filter.outputs.docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: serving_api/Dockerfile
          push: false
          tags: tcb-fraud-fastapi:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # CD — Deploy to Google Cloud VPS (only on push to main or dev/ver2)
  # ---------------------------------------------------------------------------
  deploy:
    needs: [test, docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev/ver2')
    runs-on: ubuntu-latest
    environment: production

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH || 'tcb-fraud-detection-mlops' }}
      DEPLOY_REF: ${{ github.ref_name }}
      IMAGE_TAG: ${{ github.ref_name }}-${{ github.run_number }}
      DEPLOY_REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git

    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing deploy host. Set GCP_DEPLOY_HOST in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing deploy user. Set GCP_DEPLOY_USER in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "Missing SSH key. Set SSH_DEPLOY_KEY in GitHub Secrets."
            exit 1
          fi

          echo "Deploy configuration looks present."

      - name: Deploy to Google Cloud VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          username: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          # SSH_DEPLOY_KEY must contain the private key content.
          # Install the matching public key in ~/.ssh/authorized_keys on the VPS.
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: DEPLOY_PATH,DEPLOY_REF,IMAGE_TAG,DEPLOY_REPO_URL
          script: |
            set -euo pipefail

            if [ "${DEPLOY_PATH#/}" = "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/$DEPLOY_PATH"
            fi

            for cmd in git docker; do
              if ! command -v "$cmd" >/dev/null 2>&1; then
                echo "Missing required command on VPS: $cmd"
                echo "Install prerequisites first. See docs/cloud_ssh_setup.md"
                exit 1
              fi
            done

            if ! docker compose version >/dev/null 2>&1; then
              echo "Missing required Docker Compose plugin on VPS."
              echo "Install docker-compose-plugin first. See docs/cloud_ssh_setup.md"
              exit 1
            fi

            mkdir -p $DEPLOY_PATH
            cd $DEPLOY_PATH

            if [ ! -d .git ]; then
              git clone "$DEPLOY_REPO_URL" .
            else
              git remote set-url origin "$DEPLOY_REPO_URL"
            fi

            git fetch --all --prune
            git checkout "$DEPLOY_REF"
            git pull --ff-only origin "$DEPLOY_REF"

            # Tạo .env từ .env.example nếu chưa tồn tại
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "⚠️  Created .env from .env.example — review and update secrets!"
            fi

            # Build và deploy containers
            IMAGE_TAG=$IMAGE_TAG docker compose up -d --build

      - name: Wait for services to start
        run: sleep 20

      - name: Health check — FastAPI (Stable)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          username: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: DEPLOY_PATH
          script: |
            set -euo pipefail
            if [ "${DEPLOY_PATH#/}" = "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/$DEPLOY_PATH"
            fi

            if ! command -v curl >/dev/null 2>&1; then
              echo "Missing required command on VPS: curl"
              echo "Install prerequisites first. See docs/cloud_ssh_setup.md"
              exit 1
            fi

            cd $DEPLOY_PATH
            set -a && . ./.env && set +a

            for endpoint in \
              "http://localhost:${FASTAPI_PORT:-8000}/health" \
              "http://localhost:${MLFLOW_PORT:-5000}" \
              "http://localhost:${AIRFLOW_PORT:-8080}/health" \
              "http://localhost:${GRAFANA_PORT:-3000}/api/health"; do

              echo "Checking ${endpoint}..."
              for attempt in $(seq 1 10); do
                if curl --fail --silent --show-error "$endpoint" > /dev/null 2>&1; then
                  echo "  ✓ ${endpoint} is healthy"
                  break
                fi
                if [ "$attempt" -eq 10 ]; then
                  echo "  ✗ ${endpoint} failed after 10 attempts"
                  exit 1
                fi
                sleep 10
              done
            done

            echo ""
            echo "============================================"
            echo "  All health checks passed!"
            echo "============================================"
