name: ci-cd-pipeline

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt -r serving_api/requirements.txt ruff PyYAML

      - name: Lint
        run: ruff check .

      - name: Static compile
        run: python -m compileall ml_pipeline serving_api dags monitoring streaming scripts

      - name: Validate Kubernetes manifests
        run: python scripts/validate_manifests.py

      - name: Validate Airflow DAG import
        run: python -m py_compile dags/fraud_pipeline.py

      - name: Run tests
        run: pytest ml_pipeline/tests serving_api/tests -q

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f serving_api/Dockerfile -t fraud-api:ci .

      - name: Build ML pipeline image
        run: docker build -f ml_pipeline/Dockerfile -t fraud-ml-pipeline:ci .

      - name: Build Airflow image
        run: docker build -f airflow/Dockerfile -t fraud-airflow:ci .

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r serving_api/requirements.txt -r ml_pipeline/requirements.txt

      - name: Build API image
        run: docker build -f serving_api/Dockerfile -t fraud-api:smoke .

      - name: Start API container
        run: |
          docker run -d --rm --name fraud-api-smoke \
            -e BOOTSTRAP_DEMO_ARTIFACTS=true \
            -p 8000:8000 fraud-api:smoke

      - name: Run smoke test
        run: python scripts/smoke_test_api.py --url http://localhost:8000 --timeout 120

      - name: Stop container
        if: always()
        run: docker rm -f fraud-api-smoke || true

  push-image:
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -f serving_api/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/tcb-fraud-detection-api:${IMAGE_TAG} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tcb-fraud-detection-api:${IMAGE_TAG}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: push-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.KUBE_CONFIG_STAGING != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy staging manifests
        run: |
          kubectl apply -f k8s/serving-configmap.yaml
          kubectl apply -f k8s/serving-service.yaml
          kubectl apply -f k8s/serving-deployment.yaml
          kubectl apply -f k8s/serving-hpa.yaml
          kubectl apply -f k8s/serving-ingress.yaml

  promote-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.KUBE_CONFIG_PROD != '' && vars.STAGING_SMOKE_PASSED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Load production kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config

      - name: Deploy production manifests
        run: |
          kubectl apply -f k8s/serving-configmap.yaml
          kubectl apply -f k8s/serving-service.yaml
          kubectl apply -f k8s/serving-deployment.yaml
          kubectl apply -f k8s/serving-hpa.yaml
          kubectl apply -f k8s/serving-ingress.yaml
