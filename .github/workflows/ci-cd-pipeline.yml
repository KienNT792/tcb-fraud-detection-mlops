name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 ml_pipeline/src serving_api/app dags

  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      MLFLOW_TRACKING_URI: "file:///tmp/mlruns"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_pipeline/requirements.txt -r serving_api/requirements-dev.txt

      - name: Run tests with coverage gate
        run: |
          pytest ml_pipeline/tests/test_preprocess.py \
                 ml_pipeline/tests/test_model.py \
                 ml_pipeline/tests/test_coverage.py \
                 serving_api/tests \
            --cov=ml_pipeline.src \
            --cov=serving_api.app \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -x

  docker:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      IMAGE_REPOSITORY: tungb12ok/tcb-detect-credit

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME || 'tungb12ok' }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: serving_api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
            ${{ env.IMAGE_REPOSITORY }}:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs:
      - lint
      - test
      - docker
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH || 'tcb-fraud-detection-mlops' }}
      DEPLOY_REF: ${{ github.ref_name }}
      IMAGE_TAG: ${{ github.sha }}
      GIT_REMOTE_URL: ${{ github.server_url }}/${{ github.repository }}.git
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || 'tungb12ok' }}
      DEPLOY_ENV_B64: ${{ secrets.DEPLOY_ENV_B64 || vars.DEPLOY_ENV_B64 || '' }}

    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing deploy host. Set GCP_DEPLOY_HOST in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing deploy user. Set GCP_DEPLOY_USER in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "Missing SSH key. Set SSH_DEPLOY_KEY in GitHub Secrets."
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "Missing DOCKERHUB_TOKEN. Set it in GitHub Secrets."
            exit 1
          fi

          echo "Deploy configuration looks present."

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          username: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: DEPLOY_PATH,DEPLOY_REF,IMAGE_TAG,GIT_REMOTE_URL,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,DEPLOY_ENV_B64
          script: |
            set -euo pipefail

            if [ "${DEPLOY_PATH#/}" = "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/$DEPLOY_PATH"
            fi

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -d "$DEPLOY_PATH" ] && [ -n "$(find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -print -quit 2>/dev/null)" ]; then
                echo "Deploy path exists but is not a git repository: $DEPLOY_PATH"
                exit 1
              fi

              mkdir -p "$(dirname "$DEPLOY_PATH")"
              echo "Bootstrapping repository into $DEPLOY_PATH"
              git clone --branch "$DEPLOY_REF" --single-branch "$GIT_REMOTE_URL" "$DEPLOY_PATH"
            fi

            cd "$DEPLOY_PATH"
            bash ./scripts/deploy_vps.sh
