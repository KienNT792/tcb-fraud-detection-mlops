name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev/ver2
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# CI — Lint + Test (always runs)
# ---------------------------------------------------------------------------
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          pip install -r ml_pipeline/requirements.txt -r serving_api/requirements-dev.txt

      - name: Lint
        run: flake8 ml_pipeline/src serving_api/app dags

      - name: Run all tests with coverage gate
        run: |
          pytest ml_pipeline/tests/test_preprocess.py \
                 ml_pipeline/tests/test_model.py \
                 serving_api/tests \
            --cov=ml_pipeline.src \
            --cov=serving_api.app \
            --cov-report=term-missing \
            --cov-fail-under=80

  # ---------------------------------------------------------------------------
  # Docker Build + Push
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    env:
      IMAGE_REPOSITORY: tungb12ok/tcb-detect-credit
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: tungb12ok
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: serving_api/Dockerfile
          push: true
          tags: |
            tungb12ok/tcb-detect-credit:${{ github.sha }}
            tungb12ok/tcb-detect-credit:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # CD — Deploy to Google Cloud VPS (only on push to main or dev/ver2)
  # ---------------------------------------------------------------------------
  deploy:
    needs: [test, docker]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev/ver2')
    runs-on: ubuntu-latest
    environment: production

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || secrets.DEPLOY_PATH || 'tcb-fraud-detection-mlops' }}
      DEPLOY_REF: ${{ github.ref_name }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_HOST: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_HOST}" ]; then
            echo "Missing deploy host. Set GCP_DEPLOY_HOST in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_USER}" ]; then
            echo "Missing deploy user. Set GCP_DEPLOY_USER in GitHub Secrets or Variables."
            exit 1
          fi

          if [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "Missing SSH key. Set SSH_DEPLOY_KEY in GitHub Secrets."
            exit 1
          fi

          echo "Deploy configuration looks present."

      - name: Deploy to Google Cloud VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_DEPLOY_HOST || vars.GCP_DEPLOY_HOST }}
          username: ${{ secrets.GCP_DEPLOY_USER || vars.GCP_DEPLOY_USER }}
          # SSH_DEPLOY_KEY must contain the private key content.
          # Install the matching public key in ~/.ssh/authorized_keys on the VPS.
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: DEPLOY_PATH,DEPLOY_REF,IMAGE_TAG
          script: |
            set -euo pipefail

            if [ "${DEPLOY_PATH#/}" = "$DEPLOY_PATH" ]; then
              DEPLOY_PATH="$HOME/$DEPLOY_PATH"
            fi

            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "Deploy path does not exist: $DEPLOY_PATH"
              echo "Clone the repository manually on the VPS first."
              exit 1
            fi

            cd "$DEPLOY_PATH"

            if [ ! -d .git ]; then
              echo "No git repository found in $DEPLOY_PATH"
              echo "Clone the repository manually on the VPS first."
              exit 1
            fi

            bash ./scripts/deploy_vps.sh
