name: Repository CI Guard

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install -r ml_pipeline/requirements.txt -r serving_api/requirements.txt

      - name: Lint
        run: flake8 ml_pipeline/src serving_api/app dags

      - name: Test preprocessing module with coverage gate
        run: |
          pytest ml_pipeline/tests/test_preprocess.py \
            --cov=ml_pipeline.src.preprocess \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Test serving API with coverage gate
        run: |
          pytest serving_api/tests \
            --cov=serving_api.app.main \
            --cov=serving_api.app.model_loader \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Build Docker image
        run: docker build --file serving_api/Dockerfile --tag tcb-fraud-fastapi:ci .
